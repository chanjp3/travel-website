name = "trip-architect-api"
main = "index.js"
compatibility_date = "2026-01-01"

# Set secrets with:
#   wrangler secret put DUFFEL_KEY           # real bookable flight offers (duffel.com, free tier)
#   wrangler secret put TRAVELPAYOUTS_TOKEN  # flights (Aviasales cached fares), free
#   wrangler secret put LITEAPI_KEY           # hotel rates (liteapi.travel, free key)
#                                             # (Hotellook shut down Oct 2025)
#   wrangler secret put SEATSAERO_KEY        # Seats.aero Partner API (live awards)
#   wrangler secret put AMADEUS_KEY          # optional — Enterprise API Portal only
#   wrangler secret put AMADEUS_SECRET       #   (self-service was decommissioned 2026-07-17)
[vars]
AMADEUS_BASE = "https://test.api.amadeus.com"

# Trip sync storage (save codes), 90-day TTL.
[[kv_namespaces]]
binding = "MERIDIAN_TRIPS"
id = "d9073e2438ef43acaa900bea7458e756"
